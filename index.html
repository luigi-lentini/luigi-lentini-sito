
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Lentini</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo"><span class="logo-icon">L</span><span class="logo-text">CRM Lentini</span></div>
    </div>
    <ul class="nav-menu">
      <li class="nav-item active" data-section="panoramica"><span class="nav-icon">&#9632;</span> Panoramica</li>
      <li class="nav-item" data-section="clienti"><span class="nav-icon">&#128100;</span> Clienti</li>
      <li class="nav-item" data-section="prospect"><span class="nav-icon">&#127919;</span> Prospect</li>
      <li class="nav-item" data-section="attivita"><span class="nav-icon">&#10003;</span> Attivit&agrave;</li>
      <li class="nav-item" data-section="appuntamenti"><span class="nav-icon">&#128197;</span> Appuntamenti</li>
      <li class="nav-item" data-section="processi"><span class="nav-icon">&#9881;</span> Processi</li>
    </ul>
    <div class="sidebar-footer">Luigi Lentini<br><small>Consulente Finanziario</small></div>
  </nav>
  <main class="main-content">
    <div class="top-bar">
      <h1 class="section-title" id="section-title">Panoramica</h1>
      <div class="top-bar-actions">
        <span id="current-date"></span>
        <button class="btn btn-primary" id="btn-add" onclick="openAddModal()">+ Aggiungi</button>
      </div>
    </div>
    <div id="content-area"></div>
  </main>
</div>

<!-- MODALI -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal()"></div>
<div class="modal" id="modal">
  <div class="modal-header">
    <h2 id="modal-title">Aggiungi</h2>
    <button class="modal-close" onclick="closeModal()">&times;</button>
  </div>
  <div class="modal-body" id="modal-body"></div>
  <div class="modal-footer">
    <button class="btn btn-secondary" onclick="closeModal()">Annulla</button>
    <button class="btn btn-primary" id="btn-save" onclick="saveItem()">Salva</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
