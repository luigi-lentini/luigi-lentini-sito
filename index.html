<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Lentini</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">L</div>
    <h1>CRM Lentini</h1>
    <p class="login-subtitle">Consulente Finanziario</p>
    <div class="login-form">
      <input type="password" id="login-password" placeholder="Inserisci password" onkeypress="if(event.key==='Enter') doLogin()">
      <button onclick="doLogin()">Accedi</button>
      <p id="login-error" class="login-error"></p>
    </div>
  </div>
</div>
<!-- APP -->
<div id="app" style="display:none;">
<div class="sidebar">
  <div class="sidebar-header"><div class="logo">L</div><span>CRM Lentini</span></div>
  <nav class="sidebar-nav">
    <a href="#" class="nav-item active" data-section="panoramica"><span class="nav-icon">&#9632;</span>Panoramica</a>
    <a href="#" class="nav-item" data-section="clienti"><span class="nav-icon">&#128100;</span>Clienti</a>
    <a href="#" class="nav-item" data-section="prospect"><span class="nav-icon">&#127919;</span>Prospect</a>
    <a href="#" class="nav-item" data-section="attivita"><span class="nav-icon">&#10003;</span>Attività</a>
    <a href="#" class="nav-item" data-section="appuntamenti"><span class="nav-icon">&#128197;</span>Appuntamenti</a>
    <a href="#" class="nav-item" data-section="processi"><span class="nav-icon">&#9881;</span>Processi</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info"><span class="user-name">Luigi Lentini</span><span class="user-role">Consulente Finanziario</span></div>
    <button class="logout-btn" onclick="doLogout()">&#128682; Esci</button>
  </div>
</div>
<div class="main-content">
  <div class="top-bar">
    <h2 id="section-title">Panoramica</h2>
    <div class="top-bar-right"><span id="current-date"></span><button class="btn-primary" onclick="openAddModal()">+ Aggiungi</button></div>
  </div>
  <div id="content-area"></div>
</div>
</div>
<div id="modal" class="modal" style="display:none;">
  <div class="modal-content">
    <div class="modal-header"><h3 id="modal-title">Aggiungi</h3><span class="modal-close" onclick="closeModal()">&times;</span></div>
    <div id="modal-body"></div>
    <div class="modal-footer"><button class="btn-secondary" onclick="closeModal()">Annulla</button><button class="btn-primary" onclick="saveItem()">Salva</button></div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
